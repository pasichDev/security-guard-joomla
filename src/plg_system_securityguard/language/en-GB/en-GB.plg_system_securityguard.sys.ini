PLG_SYSTEM_SECURITYGUARD_FIELDSET_TRAFFIC="Traffic Monitor"
PLG_SYSTEM_SECURITYGUARD_FIELDSET_ALERTS="Alerts"

PLG_SYSTEM_SECURITYGUARD_FIELD_TRAFFIC_ON="Enable traffic monitoring"
PLG_SYSTEM_SECURITYGUARD_FIELD_TRAFFIC_ON_DESC="Collect aggregated traffic statistics (RPS, bandwidth, response time, country, top URLs). Required for dashboard charts."
PLG_SYSTEM_SECURITYGUARD_FIELD_TRAFFIC_INTERVAL="Data aggregation interval"
PLG_SYSTEM_SECURITYGUARD_FIELD_TRAFFIC_INTERVAL_DESC="How often to aggregate metrics. 5 min recommended."
PLG_SYSTEM_SECURITYGUARD_FIELD_TRAFFIC_RETENTION="Retention (days)"
PLG_SYSTEM_SECURITYGUARD_FIELD_GEO_LOOKUP="Track country (offline IP mapping)"

PLG_SYSTEM_SECURITYGUARD_FIELD_ALERT_DDOS="DDoS detection"
PLG_SYSTEM_SECURITYGUARD_FIELD_ALERT_DDOS_DESC="Alert when traffic spikes above baseline by X times"
PLG_SYSTEM_SECURITYGUARD_FIELD_DDOS_MULTIPLIER="DDoS spike multiplier"
PLG_SYSTEM_SECURITYGUARD_FIELD_DDOS_MULTIPLIER_DESC="Current RPS vs baseline. 3x = alert when traffic 3 times normal"
PLG_SYSTEM_SECURITYGUARD_FIELD_DDOS_MIN_REQ="Min requests to trigger"

PLG_SYSTEM_SECURITYGUARD_FIELD_AUTOBLOCK_BURST="Auto-block burst IPs"
PLG_SYSTEM_SECURITYGUARD_FIELD_AUTOBLOCK_BURST_DESC="Automatically block IPs that exceed request threshold per minute"
PLG_SYSTEM_SECURITYGUARD_FIELD_BURST_THRESHOLD="Burst threshold (req/min)"
PLG_SYSTEM_SECURITYGUARD_FIELD_BURST_THRESHOLD_DESC="50 req/min is aggressive; 100 is moderate; 200 is conservative"

PLG_SYSTEM_SECURITYGUARD_FIELD_ALERT_SLOW="Alert on slow requests"
PLG_SYSTEM_SECURITYGUARD_FIELD_SLOW_THRESHOLD="Slow threshold (ms)"
PLG_SYSTEM_SECURITYGUARD_FIELD_SLOW_THRESHOLD_DESC="Requests slower than this trigger SLOW_REQUEST alerts"

; v1.3.1 security fixes
PLG_SYSTEM_SECURITYGUARD_FIELDSET_SECURITY="Security & Proxies"
PLG_SYSTEM_SECURITYGUARD_FIELD_TRUST_CF="Trust Cloudflare proxies"
PLG_SYSTEM_SECURITYGUARD_FIELD_TRUST_CF_DESC="Enable ONLY if your site is behind Cloudflare. When YES, plugin reads CF-Connecting-IP / X-Forwarded-For. When NO, only REMOTE_ADDR is trusted (recommended for direct hosting)."
PLG_SYSTEM_SECURITYGUARD_FIELD_TRUSTED_PROXIES="Trusted proxy IPs (one per line)"
PLG_SYSTEM_SECURITYGUARD_FIELD_TRUSTED_PROXIES_DESC="IP prefixes of proxies you trust (e.g. your reverse proxy 192.168.1.100). Plugin will use X-Forwarded-For only if REMOTE_ADDR matches one of these."
PLG_SYSTEM_SECURITYGUARD_FIELD_SKIP_BOT_SCORE="Skip behavior scoring for crawlers"
PLG_SYSTEM_SECURITYGUARD_FIELD_SKIP_BOT_SCORE_DESC="Don't add points for IPs whose UA looks like a search/social bot. Prevents accidental SEO damage."
PLG_SYSTEM_SECURITYGUARD_FIELD_TRACK_BODY="Track response body size"
PLG_SYSTEM_SECURITYGUARD_FIELD_TRACK_BODY_DESC="Calculates bandwidth from response body. Slight memory overhead — turn off for sites with large pages."

; v1.3.3 PHP probe burst
PLG_SYSTEM_SECURITYGUARD_FIELD_PHPPROBE="PHP probe burst detector"
PLG_SYSTEM_SECURITYGUARD_FIELD_PHPPROBE_DESC="Instantly block IPs that scan many .php URLs in a short window (e.g. /zoro.php, /cxs.php, /admin.php in 6 seconds). 7-day block."
PLG_SYSTEM_SECURITYGUARD_FIELD_PHPPROBE_THRESHOLD="PHP probe threshold"
PLG_SYSTEM_SECURITYGUARD_FIELD_PHPPROBE_THRESHOLD_DESC="Number of .php requests to trigger block. Default: 5"
PLG_SYSTEM_SECURITYGUARD_FIELD_PHPPROBE_WINDOW="PHP probe window (seconds)"
PLG_SYSTEM_SECURITYGUARD_FIELD_PHPPROBE_WINDOW_DESC="Time window for counting requests. Default: 10 seconds"

; v1.3.9 escalation + throttle
PLG_SYSTEM_SECURITYGUARD_FIELD_RETURN_THROTTLE="BLOCKED_RETURN log throttle (min)"
PLG_SYSTEM_SECURITYGUARD_FIELD_RETURN_THROTTLE_DESC="Limit logging of repeat hits from blocked IPs to once per N minutes. 0 = log every hit, 10 = once per 10 min (recommended). Block escalation: 5 attempts → 24h, 20 → 7d, 50 → 30d, 100 → permanent."
