PLG_SYSTEM_SECURITYGUARD="System - Security Guard"
PLG_SYSTEM_SECURITYGUARD_DESCRIPTION="WAF and attack monitoring for Joomla 3.10. Blocks JCE exploits, com_ajax uploads, SQL injection, brute-force attacks, and bad bots."

