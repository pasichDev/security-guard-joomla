PLG_SYSTEM_SECURITYGUARD_FIELDSET_WHITELIST="Whitelist"
PLG_SYSTEM_SECURITYGUARD_FIELDSET_PROTECTIONS="Protections"
PLG_SYSTEM_SECURITYGUARD_FIELDSET_ADVANCED="Advanced"

PLG_SYSTEM_SECURITYGUARD_FIELD_ENABLED="Enable Security Guard"
PLG_SYSTEM_SECURITYGUARD_FIELD_ENABLED_DESC="Master switch — disable to turn off all protections"

PLG_SYSTEM_SECURITYGUARD_FIELD_BLOCK_DURATION="Block duration (seconds)"
PLG_SYSTEM_SECURITYGUARD_FIELD_BLOCK_DURATION_DESC="How long an IP stays blocked after triggering a rule (default: 3600 = 1 hour)"

PLG_SYSTEM_SECURITYGUARD_FIELD_RATE_LIMIT="Rate limit (requests)"
PLG_SYSTEM_SECURITYGUARD_FIELD_RATE_LIMIT_DESC="Max requests per IP within rate window before blocking"

PLG_SYSTEM_SECURITYGUARD_FIELD_RATE_WINDOW="Rate window (seconds)"
PLG_SYSTEM_SECURITYGUARD_FIELD_RATE_WINDOW_DESC="Time window for rate limiting"

PLG_SYSTEM_SECURITYGUARD_FIELD_WHITELIST="Whitelisted IPs"
PLG_SYSTEM_SECURITYGUARD_FIELD_WHITELIST_DESC="One IP prefix per line. Example: 45.158.247. (with trailing dot for /24 subnet). These IPs are never blocked."

PLG_SYSTEM_SECURITYGUARD_FIELDSET_BRUTEFORCE="Brute-force"
PLG_SYSTEM_SECURITYGUARD_FIELD_BRUTEFORCE_ENABLED="Enable brute-force protection"
PLG_SYSTEM_SECURITYGUARD_FIELD_BRUTEFORCE_ENABLED_DESC="Count failed logins (backend and frontend) per IP and block the IP after too many failures within the time window."
PLG_SYSTEM_SECURITYGUARD_FIELD_BRUTEFORCE_THRESHOLD="Failed logins before block"
PLG_SYSTEM_SECURITYGUARD_FIELD_BRUTEFORCE_THRESHOLD_DESC="Number of failed login attempts within the window that triggers a block. Default: 5"
PLG_SYSTEM_SECURITYGUARD_FIELD_BRUTEFORCE_WINDOW="Counting window (seconds)"
PLG_SYSTEM_SECURITYGUARD_FIELD_BRUTEFORCE_WINDOW_DESC="Time window for counting failed logins. Default: 900 (15 minutes). Block duration uses the escalation from Block duration."

PLG_SYSTEM_SECURITYGUARD_FIELD_BYPASS_TOKEN="Emergency bypass token"
PLG_SYSTEM_SECURITYGUARD_FIELD_BYPASS_TOKEN_DESC="Secret value. Append ?sg_pass=&lt;token&gt; to any URL to instantly clear your own IP block — a lifesaver if you lock yourself out and have no database access. Leave empty to disable. Use a long, random value."
PLG_SYSTEM_SECURITYGUARD_FIELD_TRUST_SUPERADMIN="Auto-trust Super User IP"
PLG_SYSTEM_SECURITYGUARD_FIELD_TRUST_SUPERADMIN_DESC="When a Super User logs in successfully, remember their IP as trusted for a while so the WAF never blocks them while they work. Also clears any existing block on that IP."
PLG_SYSTEM_SECURITYGUARD_FIELD_TRUST_SUPERADMIN_DAYS="Trust duration (days)"
PLG_SYSTEM_SECURITYGUARD_FIELD_TRUST_SUPERADMIN_DAYS_DESC="How long an auto-trusted Super User IP stays trusted after the last login. Default: 7."

PLG_SYSTEM_SECURITYGUARD_FIELD_BLOCK_JCE="Block JCE exploits"
PLG_SYSTEM_SECURITYGUARD_FIELD_BLOCK_COM_AJAX="Block com_ajax uploads"
PLG_SYSTEM_SECURITYGUARD_FIELD_BLOCK_REGISTRATION="Block public registration"
PLG_SYSTEM_SECURITYGUARD_FIELD_BLOCK_SQLI="Block SQL injection patterns"
PLG_SYSTEM_SECURITYGUARD_FIELD_BLOCK_UA="Block bad user agents (scanners)"
PLG_SYSTEM_SECURITYGUARD_FIELD_BLOCK_CN="Geo-block China"
PLG_SYSTEM_SECURITYGUARD_FIELD_BLOCK_RU="Geo-block Russia"

PLG_SYSTEM_SECURITYGUARD_FIELD_LOG="Log attacks to database"
PLG_SYSTEM_SECURITYGUARD_FIELD_CLEANUP_DAYS="Auto-cleanup logs after (days)"
PLG_SYSTEM_SECURITYGUARD_FIELD_CLEANUP_DAYS_DESC="Logs older than this are auto-deleted"

PLG_SYSTEM_SECURITYGUARD_FIELD_RESPONSE_CODE="HTTP response code for blocked requests"
PLG_SYSTEM_SECURITYGUARD_FIELD_RESPONSE_CODE_DESC="404 is recommended (attackers think page doesn't exist)"

; v1.1 additions
PLG_SYSTEM_SECURITYGUARD_FIELDSET_HONEYPOT="Honeypot"
PLG_SYSTEM_SECURITYGUARD_FIELDSET_SCORING="Behavior Scoring"

PLG_SYSTEM_SECURITYGUARD_FIELD_HONEYPOT_ENABLED="Enable Honeypot"
PLG_SYSTEM_SECURITYGUARD_FIELD_HONEYPOT_ENABLED_DESC="Block IPs that access fake URLs like /shell.php, /wp-admin.php, /c99.php. Instant 7-day block on hit."
PLG_SYSTEM_SECURITYGUARD_FIELD_HONEYPOT_URLS="Custom honeypot URLs"
PLG_SYSTEM_SECURITYGUARD_FIELD_HONEYPOT_URLS_DESC="One URL per line, starting with /. Example: /admin-panel.php"

PLG_SYSTEM_SECURITYGUARD_FIELD_BEHAVIOR="Enable behavior scoring"
PLG_SYSTEM_SECURITYGUARD_FIELD_BEHAVIOR_DESC="Track suspicious patterns (no referrer, empty UA, weird requests) — block when threshold reached"
PLG_SYSTEM_SECURITYGUARD_FIELD_THRESHOLD="Block threshold (points)"
PLG_SYSTEM_SECURITYGUARD_FIELD_THRESHOLD_DESC="Default: 25. Each suspicious pattern adds 2-5 points. Lower = more aggressive."

; v1.2 additions
PLG_SYSTEM_SECURITYGUARD_FIELDSET_BOTS="Search Bots"
PLG_SYSTEM_SECURITYGUARD_FIELD_ALLOW_BOTS="Allow verified search bots"
PLG_SYSTEM_SECURITYGUARD_FIELD_ALLOW_BOTS_DESC="Skip all security checks for verified Googlebot, Bingbot, YandexBot, DuckDuckBot, Applebot, Baiduspider"
PLG_SYSTEM_SECURITYGUARD_FIELD_RDNS="Verify with reverse DNS"
PLG_SYSTEM_SECURITYGUARD_FIELD_RDNS_DESC="Slower but more secure. Confirms bot IP belongs to real bot owner via DNS lookup. Cached for 24h per IP."
PLG_SYSTEM_SECURITYGUARD_FIELD_FAKE_BOTS="Block fake bots"
PLG_SYSTEM_SECURITYGUARD_FIELD_FAKE_BOTS_DESC="Block IPs that claim to be Googlebot etc. but fail DNS verification. 30-day block."

