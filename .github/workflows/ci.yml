name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils zip

      - name: PHP lint
        run: |
          find src -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Validate XML manifests
        run: |
          find src -name '*.xml' -print0 | xargs -0 -n1 xmllint --noout

      - name: Build packages
        run: bash build/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: securityguard-packages
          path: dist/*.zip
          if-no-files-found: error
