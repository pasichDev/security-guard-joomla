name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils zip

      - name: Resolve version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(sed -n 's/.*<version>\([^<]*\)<\/version>.*/\1/p' src/pkg_securityguard.xml | head -n1)"
          echo "Tag version:      $TAG"
          echo "Manifest version: $MANIFEST_VERSION"
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match manifest <version> ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: PHP lint
        run: find src -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Validate XML manifests
        run: find src -name '*.xml' -print0 | xargs -0 -n1 xmllint --noout

      - name: Build packages
        run: bash build/build.sh

      - name: Generate update server XML
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/pkg_securityguard-${VERSION}.zip"
          mkdir -p public
          sed -e "s|__VERSION__|${VERSION}|g" \
              -e "s|__DOWNLOAD_URL__|${DOWNLOAD_URL}|g" \
              updates/updates.xml.tmpl > public/updates.xml
          xmllint --noout public/updates.xml
          cat public/updates.xml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pkg_securityguard-${{ steps.ver.outputs.version }}.zip
            dist/com_securityguard.zip
            dist/plg_system_securityguard.zip
          generate_release_notes: true

      - name: Publish update XML to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
