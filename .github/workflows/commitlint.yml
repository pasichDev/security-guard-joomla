name: Commit Lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  commitlint:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint PR commits
        uses: wagoid/commitlint-github-action@v6
